name: Update Formula

on:
  schedule:
    - cron: "0 8 * * 1"   # every Monday at 08:00 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Update Python resources
        run: |
          TAP_DIR=$(brew --repository)/Library/Taps/deeplook/homebrew-sparklines
          cp $GITHUB_WORKSPACE/Formula/sparklines.rb $TAP_DIR/Formula/sparklines.rb
          brew update-python-resources deeplook/sparklines/sparklines
          cp $TAP_DIR/Formula/sparklines.rb $GITHUB_WORKSPACE/Formula/sparklines.rb

      - name: Commit changes (if any)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update sparklines resources"
